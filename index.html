<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Финансовый трекер</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="icon" href="assets/site-icon-stub.svg" type="image/x-icon" />
        <!-- <script>
            const saved = localStorage.getItem('theme');
            if (saved !== 'dark') document.documentElement.classList.remove('dark');
        </script> -->
    </head>
    <body class="dark">
        
        <template id="transaction">
            <div class="transaction has-bg-element" data-id="">
                <div class="transaction__top">
                    <div class="transaction__left">
                        <span class="transaction__dot"></span>
                        <span class="transaction__amount"></span>
                        <span class="transaction__divider"></span>
                        <span class="transaction__category"></span>
                    </div>
                    <div class="transaction__right">
                        <div class="transaction__date"></div>
                        <button class="transaction__more" type="button" data-action="show-comment">
                            <img src="assets\-keyboard-arrow-down_90691 1.svg" alt="" />
                        </button>
                        <button
                            class="transaction__edit"
                            type="button"
                            aria-label="Редактировать"
                            data-action="open-edit-transaction"
                        >
                            <img src="assets\Edit Tool Pencil SVG Icon.svg" alt="" />
                        </button>
                        <button
                            class="transaction__delete"
                            type="button"
                            aria-label="Удалить"
                            data-action="delete-transaction"
                        >
                            <img src="assets\trash 1.svg" alt="" />
                        </button>
                    </div>
                </div>
                <p class="transaction__note">Тут есть текст, и тут его много-много*</p>
            </div>
        </template>
        <template id="category-item">
            <div type="button" class="category-item" data-id="">
                <span data-field="name"></span>
                <button data-action="" aria-label="" class="btn__del">×</button>
            </div>
        </template>
        <dialog id="add-edit-transaction" class="add-edit-transaction">
            <button data-action="close-dialog" class="close-dialog-button">x</button>
            <h2 data-modal-title>Тест</h2>
            <!-- добавить data-id в режиме редактирования -->
            <form class="transaction-form" action="" id="add-edit-form">
                <label>Тип</label>

                <div class="type-toggle two-buttons">
                    <input
                        type="radio"
                        name="type"
                        id="form-transaction-type-income"
                        value="income"
                        hidden
                    />
                    <label for="form-transaction-type-income" class="type-btn">↑ Доходы</label>

                    <input
                        type="radio"
                        name="type"
                        id="form-transaction-type-expense"
                        value="expense"
                        hidden
                        required
                    />
                    <label for="form-transaction-type-expense" class="type-btn">↓ Расходы</label>
                </div>

                <div class="label-input">
                    <label for="form-transaction-summ">Сумма транзакции</label>
                    <input
                        id="form-transaction-summ"
                        name="summ"
                        type="number"
                        step="0.01"
                        min="0.01"
                        required
                    />
                </div>

                <div class="label-input">
                    <label for="form-transaction-category">Категория</label>
                    <select id="form-transaction-category" name="category">
                        <option selected disabled hidden>Выберите категорию</option>
                    </select>
                </div>

                <div class="label-input">
                    <label for="form-transaction-date">Дата транзакции</label>
                    <input id="form-transaction-date" type="date" name="date" required />
                </div>

                <div class="label-input">
                    <label for="form-transaction-comment">Комментарий</label>
                    <textarea
                        id="form-transaction-comment"
                        placeholder="Введите комментарий (необязательно)"
                        name="comment"
                    ></textarea>
                </div>

                <div class="two-buttons">
                    <button data-action="close-dialog" type="button">Отмена</button>
                    <button data-action="" type="submit">Сохранить</button>
                </div>
            </form>
        </dialog>

        <dialog id="settings" class="dialog-conteiner">
            <div class="settings">
                <!--  -->
                <button
                    class="close-dialog-button"
                    type="button"
                    onclick="window.settings.close()"
                    aria-label="Закрыть настройки"
                >
                    <img src="assets/cancel-close-cross-delete_114048.svg" alt="" />
                </button>
                <h2 class="settings__title">Настройки</h2>
                <!-- <div class="settings__row settings__categories">
                    <span class="settings__text">Редактирование категорий:</span>
                    <span class="legend-item legend-food"><span class="legend-dot"></span><span
                            class="legend-title">Еда</span></span>
                    <span class="legend-item legend-transport"><span class="legend-dot"></span><span
                            class="legend-title">Транспорт</span></span>
                    <span class="legend-item legend-health"><span class="legend-dot"></span><span
                            class="legend-title">Здоровье</span></span>
                    <span class="legend-item legend-entertainment"><span class="legend-dot"></span><span
                            class="legend-title">Развлечения</span></span>
                    <span class="legend-item legend-house"><span class="legend-dot"></span><span
                            class="legend-title">Жильё</span></span>
                    <span class="legend-item legend-custom"><span class="legend-dot"></span><span
                            class="legend-title">Кастомная</span></span>
                    <span class="legend-item legend-custom"><span class="legend-dot"></span><span
                            class="legend-title">Кастомная</span></span>
                </div> -->
                <form class="settings__form" action="">
                    <div class="settings__add">
                        <label for="category-name">Добавить категорию:</label>
                        <input name="name" id="category-name" type="text" placeholder="Название" />
                        <input
                            name="hex"
                            type="color"
                            class="choose-color choose-color--color"
                            aria-label="Выбрать цвет"
                        />
                        <button type="button" class="choose-color" aria-label="Добавить категорию">
                            +
                        </button>
                    </div>
                </form>

                <div class="settings__theme">
                    <div class="theme-toggle">
                        <input id="dark-theme-toggle" type="checkbox" name="theme-toggle" />
                        <label for="dark-theme-toggle">
                            <span>Тёмная тема</span>
                            <span class="toggle-slider"> </span>
                        </label>
                    </div>
                </div>
                <div class="settings__bottom">
                    <button type="button" class="default-button default-button--secondary">
                        Импорт JSON
                    </button>
                    <button type="button" class="default-button">Экспорт JSON</button>
                </div>
            </div>
        </dialog>

        <dialog id="data-import" class="data-import">
            <button data-action="close-dialog" class="close-dialog-button">x</button>
            <h2>Режим импорта</h2>
            <form action="">
                <button data-action="cancel" id="export-json">Отмена</button>
                <button data-action="" id="export-json">Импортировать</button>
            </form>
        </dialog>

        <dialog id="" class="">
            <button data-action="close-dialog" class="close-dialog-button">x</button>
            <!-- Для настройки окна подтверждения действия (?) -->
            <!-- На доп разработке -->
        </dialog>

        <header class="header" id="header">
            <div class="header__left">
                <div class="logo"></div>
                <h1 class="header__title">Финансовый трекер</h1>
            </div>

            <button
                class="settings-button"
                type="button"
                data-action="open-settings"
                aria-label="Открыть настройки"
            >
                <img src="assets/Cog SVG Icon.svg" alt="" class="settings-icon" />
            </button>
        </header>
        <main>
            <section class="charts has-section-padding">
                <div id="expense-chart" class="chart chart-pie has-bg-element">
                    <div class="chart-stub">Место под диаграмму</div>
                </div>

                <div id="balance-chart" class="chart chart-line has-bg-element">
                    <div class="chart-inner">
                        <canvas id="balanceChart"></canvas>
                    </div>
                </div>

                <div id="chart-legend" class="chart-legend has-bg-element">
                    <span class="legend-stats">
                        <span class="legend-stat">
                            <span class="legend-stat__label">За 7 дней:</span>
                        </span>
                        <span class="legend-stat">
                            <span class="legend-stat__label">Доходы:</span>
                            <span data-income-summ class="legend-stat__value income"
                                >100000.00₽</span
                            >
                        </span>
                        <span class="legend-stat"
                            ><span class="legend-stat__label">Расходы:</span
                            ><span data-income-expense class="legend-stat__value expense"
                                >100000.00₽</span
                            ></span
                        >
                        <span class="legend-stat"
                            ><span class="legend-stat__label">Остаток:</span
                            ><span data-income-balance class="legend-stat__value balance"
                                >100000.00₽</span
                            ></span
                        >
                    </span>

                    <div class="legend-line"></div>

                    <span class="legend-list">
                        <span class="legend-item legend-food"
                            ><span class="legend-dot"></span
                            ><span class="legend-title">Еда</span></span
                        >
                        <span class="legend-item legend-transport"
                            ><span class="legend-dot"></span
                            ><span class="legend-title">Транспорт</span></span
                        >
                        <span class="legend-item legend-entertainment"
                            ><span class="legend-dot"></span
                            ><span class="legend-title">Развлечения</span></span
                        >
                        <span class="legend-item legend-health"
                            ><span class="legend-dot"></span
                            ><span class="legend-title">Здоровье</span></span
                        >
                        <span class="legend-item legend-house"
                            ><span class="legend-dot"></span
                            ><span class="legend-title">Жильё</span></span
                        >
                        <span class="legend-item legend-custom"
                            ><span class="legend-dot"></span
                            ><span class="legend-title">Кастомная</span></span
                        >
                        <span class="legend-item legend-custom"
                            ><span class="legend-dot"></span
                            ><span class="legend-title">Кастомная</span></span
                        >
                    </span>
                </div>
            </section>
            <section id="filter" class="filter has-bg-element">
                <div class="filter__top">
                    <div class="filter__top__sort">
                        <div class="filter__group">
                            <label for="type-sort" class="filter__label">Сортировка:</label>
                            <input type="checkbox" name="ordering" id="ordering-sort" hidden />
                            <label for="ordering-sort" class="ordering-sort">↑</label>

                            <select name="type-sort" class="filter__select" id="type-sort">
                                <option value="date" selected>По дате</option>
                                <option value="summ">По сумме</option>
                                <option disabled value="abc">По категории</option>
                            </select>
                        </div>

                        <div class="filter__group">
                            <label for="type-transaction-sort" class="filter__label">Тип:</label>
                            <select
                                name="type-transaction"
                                class="filter__select"
                                id="type-transaction-sort"
                            >
                                <option value="all" selected>Всё</option>
                                <option value="income">Доход</option>
                                <option value="expense">Расход</option>
                            </select>
                        </div>

                        <div class="filter__group">
                            <label for="category-sort" class="filter__label">Категории:</label>
                            <select
                                disabled
                                class="filter__select"
                                name="category"
                                id="category-sort"
                            >
                                <option selected disabled>Выбрать</option>
                                <!-- <option>Еда</option>
                                <option>Транспорт</option>
                                <option>Развлечения</option>
                                <option>Здоровье</option>
                                <option>Жильё</option> -->
                            </select>
                        </div>
                    </div>
                    <div class="filter__top__dates">
                        <div class="filter__group filter__dates">
                            <label for="start-date-filter" class="filter__label">с:</label>
                            <input
                                name="start-date"
                                id="start-date-filter"
                                type="date"
                                class="filter__date"
                            />
                            <label for="end-date-filter" class="filter__label">по:</label>
                            <input
                                name="end-date"
                                id="end-date-filter"
                                type="date"
                                class="filter__date"
                            />
                        </div>
                    </div>
                </div>

                <div class="filter__tags" id="filter-categories-list">
                    <div class="tag tag--green">Еда <button class="btn__del">×</button></div>
                    <div class="tag tag--blue">Транспорт <button class="btn__del">×</button></div>
                    <div class="tag tag--orange">
                        Развлечения <button class="btn__del">×</button>
                    </div>
                    <div type="button" class="tag tag--yellow">
                        Здоровье <button class="btn__del">×</button>
                    </div>
                    <div type="button" class="tag tag--purple">
                        Жильё <button class="btn__del">×</button>
                    </div>
                    <div type="button" class="tag tag--teal">
                        Кастомная <button class="btn__del__cos">×</button>
                    </div>
                    <div type="button" class="tag tag--teal">
                        Кастомная <button class="btn__del__cos">×</button>
                    </div>
                    <div type="button" class="tag tag--teal">
                        Кастомная <button class="btn__del__cos">×</button>
                    </div>
                </div>
                <form class="filter__search" action="">
                    <input type="text" name="comment" placeholder="Комментарий" />
                    <button id="comment-found">
                        <img src="assets\Лупа___.png" alt="" />
                    </button>
                </form>
            </section>
            <section class="transactions">
                <div class="transaction-list" id="transactions-list"></div>
                <button id="show-more" data-action="show-more">Показать ещё</button>
                <!-- Затычка: -->
                <button type="button" onclick="window.addEditTransaction.showModal()">
                    Добавить/редактировать
                </button>
                <button
                    class="floating-add"
                    type="button"
                    aria-label="Добавить транзакцию"
                    data-action="open-add-transaction"
                    id="add-transaction-button"
                >
                    +
                </button>
            </section>
        </main>
        <footer>
            <!-- Пока пустует -->
        </footer>        
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="script.js" defer></script>
        <script src="chart.js" defer></script>
    </body>
</html>
